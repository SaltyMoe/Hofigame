<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Hofigame – Alles Gute zum Geburtstag!</title>
<style>
  html, body { margin:0; padding:0; background:#111; height:100%; overflow:hidden; overscroll-behavior:none; touch-action:none; }
  body { display:flex; justify-content:center; align-items:center; }
  #stage { position:relative; width:100vw; height:100vh; display:flex; justify-content:center; align-items:center; }
  canvas { display:block; width: min(100vw, calc(100vh * 16 / 9)); height: min(100vh, calc(100vw * 9 / 16)); image-rendering: pixelated; image-rendering: crisp-edges; }
  /* Touch controls — only shown on touch-capable devices */
  #touch { position:absolute; inset:0; pointer-events:none; display:none; }
  body.touch #touch { display:block; }
  .tbtn {
    position:absolute; pointer-events:auto;
    background:rgba(255,255,255,0.18); border:2px solid rgba(255,255,255,0.45);
    border-radius:50%; color:#fff; font:bold 28px sans-serif;
    display:flex; align-items:center; justify-content:center;
    user-select:none; -webkit-user-select:none; -webkit-tap-highlight-color:transparent;
    backdrop-filter: blur(2px);
  }
  .tbtn.pressed { background:rgba(255,255,255,0.38); }
  #tL { left:4vw; bottom:6vh; width:14vh; height:14vh; }
  #tR { left:calc(4vw + 16vh); bottom:6vh; width:14vh; height:14vh; }
  #tJ { right:4vw; bottom:6vh; width:18vh; height:18vh; font-size:22px; }
  /* Contextual buttons — shown only when game logic enables them */
  #tS { left:calc(4vw + 32vh); bottom:9vh; width:13vh; height:13vh; font-size:16px;
        background:rgba(255,120,40,0.45); border-color:rgba(255,160,80,0.8); display:none; }
  body.touch #tS.on { display:flex; }
  /* When kickflip is available, JUMP button glows to hint double-tap */
  #tJ.flipReady { background:rgba(255,200,40,0.5); border-color:rgba(255,220,80,1); box-shadow:0 0 16px rgba(255,200,40,0.7); }
  /* Protektor input overlay on defeat hint */
  #pBox { position:absolute; left:50%; bottom:14%; transform:translateX(-50%);
          display:none; flex-direction:column; align-items:center; gap:10px;
          background:rgba(0,0,40,0.6); border:1px solid rgba(255,224,130,0.5); border-radius:12px;
          padding:14px 18px; z-index:5; pointer-events:auto; }
  body.touch #pBox.on { display:flex; }
  #pBox label { color:#ffe082; font:600 14px sans-serif; }
  #pInput { width:80px; padding:8px 10px; font:bold 22px sans-serif; text-align:center;
            border-radius:8px; border:2px solid #ffe082; background:#1a1a3a; color:#fff;
            text-transform:lowercase; }
  #pInput.wrong { border-color:#e74c3c; animation: shake 0.35s; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
  #pSubmit { padding:8px 16px; border-radius:8px; border:none; background:#ffe082; color:#222;
             font:bold 14px sans-serif; cursor:pointer; }
  /* Hint when phone is portrait */
  #rotate { position:fixed; inset:0; background:#111; color:#fff; display:none; align-items:center; justify-content:center; text-align:center; font:600 18px sans-serif; padding:24px; z-index:10; }
  @media (orientation: portrait) and (max-width: 900px) {
    body.touch #rotate { display:flex; }
  }
</style>

canvas.addEventListener('click', e => {
  if (gstate !== 'win') return;
  const r = canvas.getBoundingClientRect();
  const mx = (e.clientX - r.left) * (W / r.width);
  const my = (e.clientY - r.top)  * (H / r.height);
  if (mx >= W/2-100 && mx <= W/2+100 && my >= 420 && my <= 450) {
    lvlIdx = 0; loadLevel(0); gstate = 'title';
  }
});

// ─── INPUT ────────────────────────────────────────────────────────────────────
const keys = {};
const justPressed = new Set();
let frame = 0;
document.addEventListener('keydown', e => {
  if (!keys[e.code]) justPressed.add(e.code);
  keys[e.code] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// ─── TOUCH INPUT ──────────────────────────────────────────────────────────────
// Use (pointer: coarse) media query — true on mobile/tablet, false on desktop
// even when the device technically has a touchscreen. Falls back to a real
// touchstart event in case the media query lies on some hybrid device.
let isTouch = matchMedia('(pointer: coarse)').matches;
if (isTouch) document.body.classList.add('touch');
window.addEventListener('touchstart', () => {
  if (!isTouch) { isTouch = true; document.body.classList.add('touch'); }
}, {once:true, passive:true});

function bindTouchButton(elId, code) {
  const el = document.getElementById(elId);
  if (!el) return;
  const press = e => {
    e.preventDefault();
    if (!keys[code]) justPressed.add(code);
    keys[code] = true;
    el.classList.add('pressed');
  };
  const release = e => {
    e.preventDefault();
    keys[code] = false;
    el.classList.remove('pressed');
  };
  el.addEventListener('touchstart', press, {passive:false});
  el.addEventListener('touchend',   release, {passive:false});
  el.addEventListener('touchcancel',release, {passive:false});
  // Mouse fallback (desktop debugging)
  el.addEventListener('mousedown',  press);
  el.addEventListener('mouseup',    release);
  el.addEventListener('mouseleave', release);
}
bindTouchButton('tL', 'ArrowLeft');
bindTouchButton('tR', 'ArrowRight');
bindTouchButton('tS', 'KeyS');

// JUMP button — contextual: on ground = jump, in air with canFlip = kickflip
const tJEl = document.getElementById('tJ');
const tJPress = e => {
  e.preventDefault();
  if (player && !player.onGround && player.canFlip) {
    justPressed.add('KeyK');
    keys['KeyK'] = true;
    setTimeout(() => { keys['KeyK'] = false; }, 80);
  } else {
    if (!keys['Space']) justPressed.add('Space');
    keys['Space'] = true;
  }
  tJEl.classList.add('pressed');
};
const tJRelease = e => {
  e.preventDefault();
  keys['Space'] = false;
  tJEl.classList.remove('pressed');
};
tJEl.addEventListener('touchstart', tJPress, {passive:false});
tJEl.addEventListener('touchend',   tJRelease, {passive:false});
tJEl.addEventListener('touchcancel',tJRelease, {passive:false});
tJEl.addEventListener('mousedown',  tJPress);
tJEl.addEventListener('mouseup',    tJRelease);
tJEl.addEventListener('mouseleave', tJRelease);

// Protektor input — submit triggers KeyP on defeat hint screen
const pInput = document.getElementById('pInput');
const pSubmit = document.getElementById('pSubmit');
function submitProtectorGuess() {
  const v = (pInput.value || '').trim().toLowerCase();
  if (v[0] === 'p') {
    pInput.value = '';
    pInput.blur();
    // Restart level, grant protector, show dialog
    loadLevel(lvlIdx);
    player.prot = true;
    dialog = {speaker: null, msg: 'Glückwunsch, du hast\njetzt einen Protector!'};
    dialogTimer = 0;
    gstate = 'playing';
  } else {
    pInput.classList.add('wrong');
    setTimeout(() => pInput.classList.remove('wrong'), 400);
  }
}
pSubmit.addEventListener('click', submitProtectorGuess);
pInput.addEventListener('keydown', e => {
  e.stopPropagation();
  if (e.key === 'Enter') { e.preventDefault(); submitProtectorGuess(); }
});

// ─── SPRITES ──────────────────────────────────────────────────────────────────

function drawLukas(x, y, dir, kAngle, prot) {
  ctx.save();
  ctx.translate(x + PW/2, y + PH/2);
  if (dir < 0) ctx.scale(-1, 1);

  const flipping = kAngle > 0;
  const flipT = flipping ? kAngle / (Math.PI*2) : 0;
  // body rises away from wheel (skateboard kickflip separation)
  const bodyLift = flipping ? -Math.sin(flipT * Math.PI) * 16 : 0;
  // wheel coin-flips around its long axis while body is up
  const coinScale = flipping ? Math.cos(kAngle) : 1;

  // === BIKE (stays in place, spins under rising body) ===
  ctx.save();
  ctx.translate(2, 20);
  ctx.scale(1, coinScale);
  ctx.strokeStyle = '#444'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(-10, 8, 8, 0, Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(10, 8, 8, 0, Math.PI*2); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(-10,8); ctx.lineTo(0,-4); ctx.lineTo(10,8);
  ctx.moveTo(0,-4); ctx.lineTo(-4,2);
  ctx.moveTo(0,-4); ctx.lineTo(6,-10);
  ctx.stroke();
  ctx.restore();

  // === BODY + LEGS + HEAD (float up as one unit during flip) ===
  ctx.save();
  ctx.translate(0, bodyLift);

  // === BODY ===
  ctx.fillStyle = prot ? '#2a2a2a' : '#e8621a';
  ctx.fillRect(-10, -8, 20, 19);
  if (prot) {
    ctx.fillStyle = '#444'; ctx.fillRect(-13, -10, 26, 22);
    ctx.fillStyle = '#1a1a1a'; ctx.fillRect(-11, -8, 22, 18);
    ctx.strokeStyle = '#555'; ctx.lineWidth = 1;
    for (let i=0; i<3; i++) {
      ctx.beginPath(); ctx.moveTo(-11,-4+i*5); ctx.lineTo(11,-4+i*5); ctx.stroke();
    }
  }

  // === LEGS ===
  ctx.fillStyle = '#1a3a99';
  ctx.fillRect(-9, 11, 7, 13);
  ctx.fillRect(2, 11, 7, 13);

  // === HEAD (bald + glasses) ===
  ctx.fillStyle = '#f4c08a';
  ctx.beginPath(); ctx.arc(1, -18, 11, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.beginPath(); ctx.ellipse(-3, -22, 4, 2.5, -0.5, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#333'; ctx.lineWidth = 1.5;
  ctx.fillStyle = 'rgba(120,190,255,0.35)';
  ctx.beginPath(); ctx.arc(-4.5, -18, 4, 0, Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.arc(5.5, -18, 4, 0, Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-0.5,-18); ctx.lineTo(1.5,-18); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-14,-18); ctx.lineTo(-8.5,-18); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(9.5,-18); ctx.lineTo(14,-18); ctx.stroke();

  ctx.restore(); // end body+legs+head group

  ctx.restore();
}

function drawEnemy(x, y, w, h) {
  ctx.save();
  ctx.translate(x + w/2, y);
  // body
  ctx.fillStyle = '#c62828';
  ctx.fillRect(-w/2, 0, w, h-8);
  // head
  ctx.fillStyle = '#f4c08a';
  ctx.beginPath(); ctx.arc(0, -9, 10, 0, Math.PI*2); ctx.fill();
  // angry hair
  ctx.fillStyle = '#4a2e1a';
  ctx.fillRect(-10, -19, 20, 8);
  // angry brows
  ctx.strokeStyle = '#333'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(-7,-12); ctx.lineTo(-2,-9); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(7,-12); ctx.lineTo(2,-9); ctx.stroke();
  // sign
  ctx.fillStyle = 'white';
  ctx.strokeStyle = '#333'; ctx.lineWidth = 1;
  ctx.fillRect(-14, h-24, 28, 15); ctx.strokeRect(-14, h-24, 28, 15);
  ctx.fillStyle = '#c62828';
  ctx.font = 'bold 7px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('FPÖ', 0, h-13);
  ctx.restore();
}

function drawGymmoe(x, y) {
  ctx.save();
  ctx.translate(x, y);
  // very wide torso
  ctx.fillStyle = '#7b3f00';
  ctx.fillRect(-55, 0, 110, 85);
  // shirt stripes
  ctx.strokeStyle = '#5a2d00'; ctx.lineWidth = 3;
  for (let i=1; i<4; i++) { ctx.beginPath(); ctx.moveTo(-55, i*20); ctx.lineTo(55, i*20); ctx.stroke(); }
  // massive bicep left
  ctx.fillStyle = '#a0522d';
  ctx.beginPath(); ctx.ellipse(-70, 28, 22, 16, 0.3, 0, Math.PI*2); ctx.fill();
  ctx.fillRect(-88, 32, 36, 16); // forearm
  // massive bicep right
  ctx.beginPath(); ctx.ellipse(70, 28, 22, 16, -0.3, 0, Math.PI*2); ctx.fill();
  ctx.fillRect(52, 32, 36, 16);
  // neck
  ctx.fillStyle = '#f4c08a';
  ctx.fillRect(-12, -16, 24, 18);
  // head
  ctx.beginPath(); ctx.arc(0, -32, 26, 0, Math.PI*2); ctx.fill();
  // hair – big curly volume
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(-26, -58, 52, 24);
  ctx.beginPath(); ctx.arc(0, -46, 26, Math.PI, 0); ctx.fill();
  // extra curl puffs
  ctx.beginPath(); ctx.arc(-30,-50,13,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(30,-50,13,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(-18,-66,11,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(0,-70,13,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(18,-66,11,0,Math.PI*2); ctx.fill();
  // curl stroke detail
  ctx.strokeStyle = '#333'; ctx.lineWidth = 1.8;
  for (let row=0; row<5; row++) {
    const ry = -62 + row*9;
    ctx.beginPath(); ctx.moveTo(-26, ry);
    for (let xi=-26; xi<26; xi+=9) {
      ctx.bezierCurveTo(xi+2,ry-5, xi+7,ry+5, xi+9,ry);
    }
    ctx.stroke();
  }
  // hanging side curls
  ctx.strokeStyle='#222'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.moveTo(-28,-52); ctx.bezierCurveTo(-40,-44,-42,-32,-34,-26); ctx.bezierCurveTo(-26,-20,-40,-10,-30,-4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(28,-52); ctx.bezierCurveTo(40,-44,42,-32,34,-26); ctx.bezierCurveTo(26,-20,40,-10,30,-4); ctx.stroke();
  // eyes (half-lidded, lazy)
  ctx.fillStyle = '#333';
  ctx.fillRect(-12, -36, 8, 3);
  ctx.fillRect(4, -36, 8, 3);
  // half-closed lids
  ctx.fillStyle = '#f4c08a';
  ctx.fillRect(-12, -38, 8, 3);
  ctx.fillRect(4, -38, 8, 3);
  // frown
  ctx.strokeStyle = '#a0522d'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(0, -18, 9, 0.25, Math.PI-0.25); ctx.stroke();
  // legs
  ctx.fillStyle = '#333';
  ctx.fillRect(-48, 85, 40, 40);
  ctx.fillRect(8, 85, 40, 40);
  ctx.restore();
}

  ctx.save();

  ctx.fillStyle = '#f4c08a';

  ctx.fillStyle = '#3d2b1a';
  ctx.fillRect(-22, -22, 44, 14);
  ctx.beginPath(); ctx.arc(0, -10, 22, Math.PI, 0); ctx.fill();
  // eyes
  ctx.fillStyle = '#333';
  ctx.beginPath(); ctx.arc(-8, -4, 3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(8, -4, 3, 0, Math.PI*2); ctx.fill();
  // smile
  ctx.strokeStyle = '#333'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(0, 2, 8, 0.2, Math.PI-0.2); ctx.stroke();
  ctx.restore();
}

function drawStephiePeek(x, y) {
  ctx.save();
  ctx.translate(x, y);
  ctx.fillStyle = '#f4c08a';
  ctx.beginPath(); ctx.arc(0, 0, 20, 0, Math.PI*2); ctx.fill();
  // long brown hair
  ctx.fillStyle = '#6d3b1a';
  ctx.fillRect(-20, -20, 40, 12);
  ctx.beginPath(); ctx.arc(0, -10, 20, Math.PI, 0); ctx.fill();
  ctx.fillRect(-24, -8, 8, 18);
  ctx.fillRect(16, -8, 8, 18);

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

function drawBubble(bx, by, text, speaker, tailRight=false) {
  const lines = text.split('\n');
  ctx.font = '13px sans-serif';
  const tw = Math.max(...lines.map(l => ctx.measureText(l).width),
    speaker ? ctx.measureText(speaker+':').width + 4 : 0);
  const bw = tw + 20, bh = lines.length*18 + (speaker?20:0) + 16;
  ctx.fillStyle = 'white'; ctx.strokeStyle = '#333'; ctx.lineWidth = 2;
  roundRect(bx, by, bw, bh, 8); ctx.fill(); ctx.stroke();
  // tail
  if (tailRight) {
    ctx.beginPath(); ctx.moveTo(bx+bw-20,by+bh); ctx.lineTo(bx+bw-8,by+bh+12); ctx.lineTo(bx+bw-38,by+bh); ctx.closePath();
  } else {
    ctx.beginPath(); ctx.moveTo(bx+20, by+bh); ctx.lineTo(bx+8, by+bh+12); ctx.lineTo(bx+38, by+bh); ctx.closePath();
  }
  ctx.fillStyle = 'white'; ctx.fill(); ctx.strokeStyle = '#ccc'; ctx.lineWidth = 1; ctx.stroke();
  let ty = by+14;
  if (speaker) {
    ctx.fillStyle = '#0055cc'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'left';
    ctx.fillText(speaker+':', bx+10, ty); ty += 20;
  }
  ctx.fillStyle = '#111'; ctx.font = '13px sans-serif'; ctx.textAlign = 'left';
  for (const l of lines) { ctx.fillText(l, bx+10, ty); ty += 18; }
}

function drawThoughtBubble(bx, by, text) {
  const lines = text.split('\n');
  ctx.font = '12px sans-serif';
  const tw = Math.max(...lines.map(l => ctx.measureText(l).width));
  const bw = tw + 24, bh = lines.length * 17 + 18;
  ctx.fillStyle = 'white'; ctx.strokeStyle = '#aaa'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(bx+8, by+bh+20, 3, 0, Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.arc(bx+15, by+bh+12, 4, 0, Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.arc(bx+24, by+bh+5, 5, 0, Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#f0f8ff';
  roundRect(bx, by, bw, bh, 12); ctx.fill();
  for (let xi = bx+12; xi < bx+bw-8; xi += 16) {
    ctx.beginPath(); ctx.arc(xi, by, 8, Math.PI, 0); ctx.fill();
  }
  ctx.strokeStyle = '#aaa'; ctx.lineWidth = 1.5;
  roundRect(bx, by, bw, bh, 12); ctx.stroke();
  let ty = by + 17;
  ctx.fillStyle = '#222'; ctx.font = '12px sans-serif'; ctx.textAlign = 'left';
  for (const l of lines) { ctx.fillText(l, bx+10, ty); ty += 17; }
}

// ─── PARTICLES ────────────────────────────────────────────────────────────────
const CC = ['#e74c3c','#3498db','#2ecc71','#f1c40f','#9b59b6','#e67e22','#1abc9c','#ff69b4'];
class Confetti {
  constructor(init=false) { this.reset(init); }
  reset(init=false) {
    this.x = Math.random()*W; this.y = init ? Math.random()*H : -10;
    this.vx = (Math.random()-0.5)*2.5; this.vy = 1.2+Math.random()*2.5;
    this.rot = Math.random()*Math.PI*2; this.rv = (Math.random()-0.5)*0.14;
    this.c = CC[Math.random()*CC.length|0];
    this.w = 5+Math.random()*7; this.h = 3+Math.random()*4;
  }
  tick() {
    this.x+=this.vx; this.y+=this.vy; this.rot+=this.rv;
    if (this.y>H+10) this.reset();
  }
  draw() {
    ctx.save(); ctx.translate(this.x,this.y); ctx.rotate(this.rot);
    ctx.fillStyle=this.c; ctx.fillRect(-this.w/2,-this.h/2,this.w,this.h);
    ctx.restore();
  }
}
const confetti = Array.from({length:150}, (_,i) => new Confetti(true));

// ─── PHYSICS ──────────────────────────────────────────────────────────────────
function overlap(a, b) {
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

// ─── ENTITIES ─────────────────────────────────────────────────────────────────
class Player {
  constructor() {
    this.x=50; this.y=300; this.vx=0; this.vy=0;
    this.onGround=false; this.dir=1;
    this.canFlip=false; this.flipAngle=0; this.flipping=false;
    this.prot=false; this.w=PW; this.h=PH;
  }
  update(platforms) {
    if (!this.flipping) {
      if (keys['ArrowRight']) { this.vx=PLAYER_SPEED; this.dir=1; }
      else if (keys['ArrowLeft']) { this.vx=-PLAYER_SPEED; this.dir=-1; }
      else this.vx=0;
    }

    if ((justPressed.has('ArrowUp')||justPressed.has('Space')) && this.onGround) {
      this.vy=JUMP_FORCE; this.onGround=false; this.canFlip=true;
    }
    if (justPressed.has('KeyK') && !this.onGround && this.canFlip) {
      this.flipping=true; this.flipAngle=0; this.canFlip=false;
      this.vy = Math.min(this.vy, JUMP_FORCE * 1.15); // modest height boost (~32% more)
      this.vx = this.dir * PLAYER_SPEED * 2.0;         // forward boost needed for Level 2 gap
    }
    if (this.flipping) {
      this.flipAngle += 0.18;
      if (this.flipAngle >= Math.PI*2) { this.flipAngle=0; this.flipping=false; }
    }
    // land mid-flip → abort flip cleanly
    this.vy += GRAVITY;
    this.x += this.vx; this.y += this.vy;
    this.onGround = false;
    for (const p of platforms) {
      const prev = this.y + PH - this.vy;
      if (prev <= p.y && this.y+PH >= p.y &&
          this.x+PW > p.x && this.x < p.x+p.w) {
        this.y = p.y - PH; this.vy = 0; this.onGround = true;
      }
    }
    if (this.flipping && this.onGround) { this.flipping=false; this.flipAngle=0; }
    if (this.x < 0) this.x = 0;
    if (this.y + PH > H + 80) return 'fell';
  }
  draw(cx) { drawLukas(this.x-cx, this.y, this.dir, this.flipping?this.flipAngle:0, this.prot); }
  get bounds() { return {x:this.x, y:this.y, w:PW, h:PH}; }
}

class EnemyNPC {
  constructor(d) { Object.assign(this,d); this.w=d.w; this.h=d.h; }
  update() {
    this.x+=this.vx;
    if (this.x>this.maxX||this.x<this.minX) this.vx*=-1;
  }
  draw(cx) {
    const sx = this.x-cx;
    drawEnemy(sx, this.y, this.w, this.h);
    if (this.msg) drawBubble(sx-10, this.y-68, this.msg, null);
  }
  get bounds() { return {x:this.x, y:this.y, w:this.w, h:this.h}; }
}

class Boss {
  constructor() {
    this.x=1100; this.y=255; this.w=110; this.h=125;
    this.phase='blocking'; this.mIdx=0; this.mTimer=0; this.launchVy=0;
    this.msgs=[
      'Ahhh, heute bin ich zu faul\nmich hier zu bewegen.',
      'Keine Lust',
      'Rülps mich nicht\nvon der Seite an',
    ];
  }
  update() {
    this.mTimer++;
    if (this.mTimer>200) { this.mTimer=0; this.mIdx=(this.mIdx+1)%this.msgs.length; }
    if (this.phase==='pushed') {
      this.launchVy -= 0.4;   // accelerate upward
      this.y += this.launchVy;
    }
  }
  draw(cx) {
    const sx=this.x-cx;
    drawGymmoe(sx+this.w/2, this.y);
    if (this.phase==='blocking') drawBubble(sx-30, this.y-185, this.msgs[this.mIdx], 'GYMMOE');
  }
  get bounds() { return {x:this.x, y:0, w:this.w, h:H}; }
  get offScreen() { return this.y < -300; }
}

function loadLevel(i) {
  const L = LEVELS[i];
  player = new Player();
  if (L.startY) player.y = L.startY;
  enemies = L.enemies.map(e => new EnemyNPC({...e}));
  boss = L.hasBoss ? new Boss() : null;
  events = L.events.map(e => ({...e}));
  dialog = null; dialogTimer = 0; camX = 0; childWarningShown = false;
  bossDefeated = false;
  johannesFly = (i===3) ? {x:W+80, y:155, timer:0, active:false} : null;
  npcs = (L.npcs||[]).map(n => {
    const obj = {...n};
    if (obj.type === 'corinna') { obj.pushed = false; obj.launchVy = 0; obj.y = obj.gy; }
    return obj;
  });
}

// ─── UPDATE ───────────────────────────────────────────────────────────────────
function update() {
  if (gstate !== 'playing') return;
  frame++;
  const L = LEVELS[lvlIdx];
  for (const e of enemies) e.update();
  if (boss) boss.update();

  const res = player.update(L.platforms);
  if (res === 'fell') { restart(); return; }

  // camera
  camX = Math.max(0, Math.min(player.x - W/3, L.worldW - W));

  // event triggers (dialog)
  for (const ev of events) {
    if (!ev.done && player.x >= ev.trigX) {
      ev.done = true;
      dialog = {speaker: ev.speaker, msg: ev.msg};
      dialogTimer = 0;
    }
  }
  if (dialog) { dialogTimer++; if (dialogTimer > 220) dialog = null; }

  // child obstacle collision (Level 1)
  if (lvlIdx === 0 && !dialog) {
    for (const c of (L.children||[])) {
      const hb = c.type==='katy' ? {x:c.cx-16,y:332,w:32,h:48}
               : c.type==='mona' ? {x:c.cx-11,y:325,w:22,h:55}
               : {x:c.cx-12,y:336,w:24,h:44};
      if (overlap(player.bounds, hb)) {
        if ((c.type==='bike'||c.type==='laufrad') && !childWarningShown) {
          childWarningShown = true;
          dialog = {speaker:'Stephie', msg:'Hey, fahr nicht Helena und Clara\nüber den Haufen!\nNutze Leertaste um zu springen.'};
          dialogTimer = 0;
          player.x=50; player.y=338; player.vx=0; player.vy=0; player.onGround=false;
        } else { restart(); return; }
        break;
      }
    }
  }

  // Corinna launch physics
  for (const n of npcs) {
    if (n.type === 'corinna' && n.pushed) {
      n.launchVy -= 0.4;
      n.y += n.launchVy;
    }
  }

  // NPC obstacle collision
  for (const n of npcs) {
    if (!n.obstacle) continue;
    // Corinna: S key gives her a Spezi instead of restarting
    if (n.type === 'corinna') {
      if (n.pushed) continue;
      const hb = {x:n.cx-8, y:n.y-60, w:16, h:60};
      if (overlap(player.bounds, hb) && keys['KeyS']) {
        n.pushed = true; n.launchVy = -10;
      }
      continue;
    }
    let hb;
    switch(n.type) {
      case 'johanna':   hb={x:n.cx-28,y:n.gy-22,w:56,h:22}; break;
      case 'velomobil': hb={x:n.cx-38,y:n.gy-42,w:76,h:42}; break;
      case 'simon':           hb={x:n.cx-8, y:n.gy-60,w:16,h:60}; break;
      case 'campari':         hb={x:n.cx-11,y:n.gy-28,w:22,h:28}; break;
      case 'felix':           hb={x:n.cx-8, y:n.gy-60,w:16,h:60}; break;
      case 'simon_innsbruck': hb={x:n.cx-8, y:n.gy-60,w:16,h:60}; break;
      default: continue;
    }
    if (overlap(player.bounds, hb)) { restart(); return; }
  }

  // enemy collision
  for (const e of enemies) {
    if (overlap(player.bounds, e.bounds)) { restart(); return; }
  }

  // Johannes flyby (Level 4)
  if (johannesFly) {
    if (!johannesFly.active) {
      johannesFly.timer++;
      if (johannesFly.timer > 300) { johannesFly.active = true; }
    } else {
      johannesFly.x -= 2;
      if (johannesFly.x < -130) { johannesFly.active=false; johannesFly.timer=0; johannesFly.x=W+80; }
    }
  }

  // boss logic
  if (boss) {
    if (justPressed.has('KeyP') && !player.prot) {
      player.prot = true;
      dialog = {speaker: null, msg: 'Glückwunsch, du hast\njetzt einen Protector!'};
      dialogTimer = 0;
    }
    if (boss.phase === 'blocking' && overlap(player.bounds, boss.bounds)) {
      if (player.prot) boss.phase = 'pushed';
      else { gstate = 'defeatHint'; return; }
    }
    if (boss.phase === 'pushed' && boss.offScreen && !bossDefeated) {
      bossDefeated = true;
    }
  }
  if (bossDefeated && player.x >= 1400) { gstate = 'win'; return; }

  // goal
  if (!L.hasBoss && player.x >= L.goalX) {
    gstate = 'levelDone';
  }
}

function restart() { loadLevel(lvlIdx); gstate = 'playing'; }

// ─── DRAW ─────────────────────────────────────────────────────────────────────
function drawPlaying() {
  const L = LEVELS[lvlIdx];
  ctx.fillStyle = L.bg; ctx.fillRect(0,0,W,H);
  // Johannes flyby (background, before everything)
  if (johannesFly && johannesFly.active) {
    drawJohannes(johannesFly.x, johannesFly.y);
    drawBubble(johannesFly.x+15, johannesFly.y-62, 'Ich will mehr Pizza', 'Johannes');
  }
  for (const d of L.decos) drawDeco({...d, x:d.x-camX});
  // platforms
  for (const p of L.platforms) {
    ctx.fillStyle = L.ground;
    ctx.fillRect(p.x-camX, p.y, p.w, p.h);
    ctx.fillStyle = '#56ab2f';
    ctx.fillRect(p.x-camX, p.y, p.w, 5);
  }
  // goal flag
  if (!L.hasBoss) {
    const fx = L.goalX - camX;
    if (fx > -40 && fx < W+10) drawFlag(fx, 328);
  }
  if (bossDefeated) {
    const fx = 1400 - camX;
    if (fx > -40 && fx < W+10) drawFlag(fx, 325);
  }
  for (const e of enemies) e.draw(camX);
  // NPC figures
  for (const n of npcs) {
    const sx = n.cx - camX;
    if (sx < -160 || sx > W+120) continue;
    switch(n.type) {
      case 'niko':
        drawNikoStanding(sx, n.gy);
        drawBubble(sx+15, n.gy-148, isTouch ? 'Mach einen Kickflip!\n(tippe JUMP nochmal in der Luft)' : 'Mach einen Kickflip!\n(drücke K in der Luft)', 'Niko');
        break;
      case 'johanna':
        drawJohanna(sx, n.gy);
        drawBubble(sx-20, n.gy-165, 'Ich bin gestürzt, aber kein\nProblem, morgen 150km Radtour', 'Johanna');
        break;
      case 'velomobil':
        drawVelomobil(sx, n.gy);
        drawBubble(sx+40, n.gy-185, 'Bald KPMG Gehalt\nhehehe, da kann man sich\nschon Mal was gönnen', 'Jakob');
        break;
      case 'simon':
        drawSimon(sx, n.gy);
        drawBubble(sx+10, n.gy-155, 'Mein Bike ist schon wieder\nkaputt, Tre Campari Spritz,\nper favore.', 'Simon');
        break;
      case 'campari':
        drawCampariGlass(sx, n.gy);
        break;
      case 'katha':
        drawKatha(sx, n.gy);
        drawThoughtBubble(sx+15, n.gy-215, '5 Prellungen, alles voller\nblauer Flecken, aber kein\nProblem, ich bin die nächsten\n3 Wochen eh komplett verplant\nmit Arbeit, 4 Hausparties\nund Radtouren');
        break;
      case 'felix': {
        drawFelix(sx, n.gy);
        const felixMsgs = [
          'Ja klar, mein Bike kannst\ndu haben aber wehe du\nlegst den Schwamm nochmal\nan die falsche Stelle in\nder Küche, dann fliegst\ndu raus.',
          'Hmmm, noch 5g Protein\nheute essen und 3g\nKreatin, dann sollte ich\nbei Recovery Score 90+\nmeine FTP morgen um\n2,2% verbessert haben.'
        ];
        drawBubble(sx+15, n.gy-235, felixMsgs[Math.floor(frame/300)%2], 'Felix');
        break;
      }
      case 'simi':
        drawSimi(sx, n.gy);
        drawBubble(sx+15, n.gy-150, 'Psychoanalyse ist die\neinzige richtige\nAntwort.', 'Simi');
        break;
      case 'simon_innsbruck':
        drawSimon(sx, n.gy);
        drawBubble(sx-195, n.gy-185, 'Schau mich nicht so an\nsonst lasse ich dich\nfeuern.', 'Simon', true);
        break;
      case 'corinna':
        if (n.pushed) {
          drawCorinna(sx, n.y);
          drawBubble(sx+20, n.y-80, 'Juhuuu, danke!', 'Corinna');
        } else {
          drawCorinna(sx, n.gy);
          drawBubble(sx+20, n.gy-160, 'Hofi wo ist\nmeine Spezi?', 'Corinna');
        }
        break;
    }
  }
  if (lvlIdx === 0) {
    for (const c of (LEVELS[0].children||[])) {
      const sx = c.cx - camX;
      if (sx < -120 || sx > W+80) continue;
      if (c.type === 'bike' || c.type === 'laufrad') {
        drawChild(sx, 367, c.type, c.name);
      } else if (c.type === 'mona') {
        drawMona(sx, 380);
        drawBubble(sx+15, 195, 'MTB is gruselig,\nich backe lieber', null);
      } else if (c.type === 'katy') {
        drawKaty(sx, 380);
        drawBubble(sx+15, 225, 'Rennrad > MTB', null);
      }
    }
  }
  if (boss) boss.draw(camX);
  player.draw(camX);

  // Spezi notification
  if (npcs.some(n => n.type === 'corinna' && n.pushed)) {
    ctx.fillStyle='rgba(0,0,0,0.75)'; ctx.fillRect(4,32,322,26);
    ctx.fillStyle='#ffe082'; ctx.font='bold 13px sans-serif'; ctx.textAlign='left';
    ctx.fillText('Du hast Corinna eine Spezi gegeben. 🥤', 10, 49);
  }

  // HUD
  ctx.fillStyle='rgba(0,0,0,0.45)'; ctx.fillRect(0,0,240,28);
  ctx.fillStyle='#fff'; ctx.font='bold 14px sans-serif'; ctx.textAlign='left';
  ctx.fillText(`Level ${lvlIdx+1}: ${L.name}`, 8, 19);
  ctx.fillStyle='rgba(0,0,0,0.35)'; ctx.fillRect(W-220,0,220,28);
  ctx.fillStyle='#bbb'; ctx.font='11px sans-serif'; ctx.textAlign='right';
  ctx.fillText('←→ fahren  ↑/Space springen'+(lvlIdx>=1?' K=Kickflip':''), W-6, 18);

  // dialog
  if (dialog) {
    if (lvlIdx === 0) drawStephiePeek(30, 430);
    if (lvlIdx === 1) drawNikoPeek(30, 330);
    drawBubble(70, 60, dialog.msg, dialog.speaker);
  }
}

// ─── MAIN LOOP ────────────────────────────────────────────────────────────────
function handleInput() {
  if (gstate === 'title' && justPressed.has('Space')) {
    lvlIdx = 0; loadLevel(0); gstate = 'playing';
  }
  if (gstate === 'levelDone' && justPressed.has('Space')) {
    lvlIdx++; loadLevel(lvlIdx); gstate = 'playing';
  }
  if (gstate === 'defeatHint' && justPressed.has('Space')) {
    loadLevel(lvlIdx); gstate = 'playing';
  }
  if (gstate === 'win' && justPressed.has('Space')) {
    lvlIdx = 0; loadLevel(0); gstate = 'title';
  }
}

function draw() {
  ctx.clearRect(0,0,W,H);
  switch(gstate) {
    case 'title':     drawTitle(); break;
    case 'playing':   drawPlaying(); break;
    case 'levelDone': drawPlaying(); drawLevelDone(); break;
    case 'defeatHint':drawPlaying(); drawDefeatHint(); break;
    case 'win':       drawWin(); break;
  }
}

// Toggle contextual touch UI based on game state — runs every frame
const tSEl = document.getElementById('tS');
const pBox = document.getElementById('pBox');
function updateTouchUI() {
  const playing = (gstate === 'playing');
  // JUMP button glows yellow when a kickflip is available (Level 2+ in air)
  const flipReady = playing && player && !player.onGround && player.canFlip && lvlIdx >= 1;
  tJEl.classList.toggle('flipReady', flipReady);
  // S (Spezi): overlapping Corinna in Level 3
  let showS = false;
  if (playing && player && npcs) {
    for (const n of npcs) {
      if (n.type === 'corinna' && !n.pushed) {
        const hb = {x:n.cx-8, y:n.y-60, w:16, h:60};
        if (overlap(player.bounds, hb)) { showS = true; break; }
      }
    }
  }
  tSEl.classList.toggle('on', showS);
  // P input: on defeat hint screen
  pBox.classList.toggle('on', gstate === 'defeatHint');
}

function loop() {
  handleInput(); update(); draw(); updateTouchUI();
  justPressed.clear();
  requestAnimationFrame(loop);
}
loop();
</script>
